<!DOCTYPE html><html class="light" lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Daftar Penjual - PasarUMKM</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        .bg-soft-gradient {
            background: radial-gradient(circle at 0% 0%, #e7eeff 0%, #f9f9ff 50%, #d7e3fb 100%);
        }
        .registration-card {
            box-shadow: 0px 12px 24px rgba(23, 43, 77, 0.08);
            backdrop-filter: blur(8px);
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "tertiary-fixed-dim": "#c3c7ca",
                      "on-tertiary-container": "#d0d3d6",
                      "on-secondary": "#ffffff",
                      "outline-variant": "#c3c6d6",
                      "outline": "#737685",
                      "on-tertiary-fixed": "#181c1e",
                      "tertiary-fixed": "#e0e3e6",
                      "surface-container-highest": "#d7e3fb",
                      "on-tertiary": "#ffffff",
                      "error": "#ba1a1a",
                      "error-container": "#ffdad6",
                      "primary-container": "#0052cc",
                      "on-tertiary-fixed-variant": "#43474a",
                      "on-primary-fixed": "#001848",
                      "inverse-primary": "#b2c5ff",
                      "on-surface-variant": "#434654",
                      "surface-container-low": "#f0f3ff",
                      "on-secondary-fixed-variant": "#34476a",
                      "background": "#f9f9ff",
                      "secondary-fixed-dim": "#b4c7f1",
                      "secondary-fixed": "#d7e2ff",
                      "on-error-container": "#93000a",
                      "on-secondary-fixed": "#041b3c",
                      "surface-dim": "#cedbf2",
                      "surface-bright": "#f9f9ff",
                      "primary-fixed": "#dae2ff",
                      "primary": "#003d9b",
                      "on-primary-fixed-variant": "#0040a2",
                      "on-surface": "#101c2d",
                      "on-error": "#ffffff",
                      "tertiary-container": "#575b5e",
                      "on-primary": "#ffffff",
                      "surface": "#f9f9ff",
                      "surface-variant": "#d7e3fb",
                      "surface-tint": "#0c56d0",
                      "surface-container-lowest": "#ffffff",
                      "tertiary": "#404446",
                      "surface-container-high": "#dee9ff",
                      "on-background": "#101c2d",
                      "inverse-on-surface": "#ebf1ff",
                      "primary-fixed-dim": "#b2c5ff",
                      "inverse-surface": "#253143",
                      "on-primary-container": "#c4d2ff",
                      "surface-container": "#e7eeff",
                      "secondary": "#4c5e83",
                      "secondary-container": "#bfd2fd",
                      "on-secondary-container": "#475a7e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "8px",
                      "gutter": "24px",
                      "margin-mobile": "16px",
                      "container-max": "1280px",
                      "unit": "8px",
                      "stack-md": "16px",
                      "stack-lg": "32px",
                      "margin-desktop": "40px"
              },
              "fontFamily": {
                      "headline-xl": ["Inter"],
                      "body-md": ["Inter"],

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-0 bg-soft-gradient overflow-x-hidden">
<!-- Subtle Background Element -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<main class="relative z-10 w-full max-w-xl fade-in px-margin-mobile my-12">
<!-- Minimal Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight mb-2">PasarUMKM</h1>
<p class="font-body-md text-body-md text-secondary">Bawa UMKM Anda ke Level Global</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest registration-card border border-outline-variant rounded-xl p-8 md:p-10 transition-all duration-300">
<div class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Daftar Penjual</h2>
<p class="font-body-sm text-body-sm text-outline">Lengkapi data di bawah untuk mulai berjualan.</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault(); alert('Registrasi berhasil dikirim!');">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1">Nama Lengkap</label>
<input class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all duration-200 font-body-md text-body-md" placeholder="" required="" type="text">
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1">Nama Toko</label>
<input class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all duration-200 font-body-md text-body-md" placeholder="" required="" type="text">
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1">Kategori Produk</label>
<select class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all duration-200 font-body-md text-body-md bg-white">
<option value="">Pilih Kategori</option>
<option>Makanan &amp; Minuman</option>
<option>Fashion &amp; Tekstil</option>
<option>Kriya &amp; Kerajinan</option>
<option>Kecantikan &amp; Kesehatan</option>
<option>Lainnya</option>
</select>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1">Lokasi (Kota)</label>
<input class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all duration-200 font-body-md text-body-md" placeholder="" required="" type="text">
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1">Nomor WhatsApp</label>
<input class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all duration-200 font-body-md text-body-md" placeholder="083132779089" required="" type="tel">
</div>
</div>
<a href="Beranda.html">
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-body-md py-4 rounded-xl shadow-sm hover:shadow-md active:scale-95 transition-all duration-200 mt-4" href="Beranda.html">
                    Daftar Sekarang
                </button></a>
<p class="text-center font-body-sm text-body-sm text-secondary mt-4">
                    Dengan mendaftar, Anda menyetujui 
                    <a class="text-primary hover:underline font-medium" href="#">Ketentuan Layanan</a> kami.
                </p>
</form>
</div>
<!-- Minimal Footer Links -->
<div class="mt-stack-lg flex justify-center gap-gutter">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Pusat Bantuan</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Keamanan</a>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Bahasa</a>
</div>
</main>
<!-- Visual Polish / Floating Shapes (matching login screen style) -->
<div class="fixed top-20 right-20 w-32 h-32 bg-secondary-container/30 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed bottom-20 left-20 w-48 h-48 bg-primary-container/20 rounded-full blur-3xl pointer-events-none"></div>
<script>
        // Visual micro-interaction for input focus
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
